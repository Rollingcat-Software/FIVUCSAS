server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml text/xml;

    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location ~* \.(css|js|woff2|svg|png|jpe?g|gif|ico|webp|avif)$ { expires 30d; add_header Cache-Control "public"; }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
