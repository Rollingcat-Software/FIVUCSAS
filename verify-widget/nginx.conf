server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # SDK files at root level — match FIRST so long-cache rule below doesn't
    # shadow it. Short max-age because the URL is not content-hashed; a long
    # cache combined with a stale SRI hash on third-party embedders
    # (demo.fivucsas.com) blocks the script on their next visit. Embedders
    # should additionally cache-bust with ?v= on the URL.
    location ~* ^/fivucsas-auth\.(esm\.)?js(\.map)?$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # Cache other static assets
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options "ALLOWALL";
        add_header Content-Security-Policy "frame-ancestors *";
        # Permit biometric features on the widget origin so parent iframe delegation works.
        add_header Permissions-Policy "camera=(self), microphone=(self), publickey-credentials-get=(self), publickey-credentials-create=(self)";
    }

    # Health check
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
