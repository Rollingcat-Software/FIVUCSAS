version: '3.8'

# FIVUCSAS - Face and Identity Verification Using Cloud-based SaaS
# Unified Docker Compose for Local Development
# Copyright © 2025 FIVUCSAS Team - Marmara University

services:
  # ============================================================================
  # Database Layer
  # ============================================================================

  postgres:
    image: pgvector/pgvector:pg16
    container_name: fivucsas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: identity_core_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_password
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/sql/init:/docker-entrypoint-initdb.d
    networks:
      - fivucsas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Cache & Message Queue Layer
  # ============================================================================

  redis:
    image: redis:7-alpine
    container_name: fivucsas-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_dev_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fivucsas-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_dev_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ============================================================================
  # Backend Microservices
  # ============================================================================

  identity-core-api:
    build:
      context: ./identity-core-api
      dockerfile: Dockerfile
    container_name: fivucsas-identity-core-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Spring profiles
      SPRING_PROFILES_ACTIVE: dev

      # Database configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: identity_core_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres_dev_password

      # Redis configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_dev_password

      # JWT configuration
      JWT_SECRET: fivucsas-dev-secret-key-change-in-production-256-bits
      JWT_ACCESS_TOKEN_EXPIRATION: 3600000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000

      # Biometric Processor API
      BIOMETRIC_PROCESSOR_URL: http://biometric-processor:8001

      # Logging
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_APP: DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fivucsas-network
    volumes:
      - ./identity-core-api/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  biometric-processor:
    build:
      context: ./biometric-processor
      dockerfile: Dockerfile
    container_name: fivucsas-biometric-processor
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      # Application
      APP_NAME: Biometric Processor API
      ENVIRONMENT: development
      DEBUG: "True"

      # Server
      HOST: 0.0.0.0
      PORT: 8001
      WORKERS: 2

      # Database (PostgreSQL with pgvector)
      DATABASE_URL: postgresql://postgres:postgres_dev_password@postgres:5432/identity_core_db
      DATABASE_POOL_MIN_SIZE: 10
      DATABASE_POOL_MAX_SIZE: 20
      USE_PGVECTOR: "False"
      EMBEDDING_DIMENSION: 512

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_dev_password

      # Identity Core API
      IDENTITY_CORE_API_URL: http://identity-core-api:8080/api/v1

      # Face Recognition
      FACE_MODEL: VGG-Face
      FACE_DETECTOR: opencv
      SIMILARITY_THRESHOLD: 0.6
      EMBEDDING_DIMENSION: 2622

      # Liveness Detection
      LIVENESS_ENABLED: "True"
      PUZZLE_MIN_STEPS: 3
      PUZZLE_MAX_STEPS: 5
      PUZZLE_TIMEOUT_SECONDS: 30

      # Performance
      USE_GPU: "False"
      BATCH_SIZE: 16
      MAX_IMAGE_SIZE: 1920
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fivucsas-network
    volumes:
      - ./biometric-processor/logs:/app/logs
      - biometric_models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================================
  # API Gateway (Optional - for production-like setup)
  # ============================================================================

  api-gateway:
    image: nginx:alpine
    container_name: fivucsas-api-gateway
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./docs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docs/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - identity-core-api
      - biometric-processor
    networks:
      - fivucsas-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # Monitoring & Observability
  # ============================================================================
  # To enable monitoring, use: docker-compose -f docker-compose.yml -f monitoring/docker-compose.monitoring.yml up -d
  # Or run: cd monitoring && docker-compose -f docker-compose.monitoring.yml up -d
  #
  # Access:
  # - Grafana: http://localhost:3000 (admin/admin)
  # - Prometheus: http://localhost:9090
  # - Alertmanager: http://localhost:9093
  #
  # See MONITORING.md for complete documentation

# ============================================================================
# Networks
# ============================================================================

networks:
  fivucsas-network:
    driver: bridge
    name: fivucsas-network

# ============================================================================
# Volumes
# ============================================================================

volumes:
  postgres_data:
    name: fivucsas-postgres-data
  redis_data:
    name: fivucsas-redis-data
  biometric_models:
    name: fivucsas-biometric-models
