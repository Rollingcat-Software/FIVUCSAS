server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml text/xml;

    location ~* \.(css|js|woff2|svg|png|jpe?g|gif|ico|webp)$ { expires 30d; add_header Cache-Control "public"; }

    # Static multi-page demo (index.html, dashboard.html, callback.html).
    location / {
        try_files $uri $uri/ =404;
    }
}
