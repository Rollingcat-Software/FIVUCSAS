      <text class="c4-ttitle" x="397" y="222">Hosted Login + Widget</text>
      <text class="c4-ttech"  x="381" y="248">React build + nginx</text>
      <text class="c4-tdesc"  x="381" y="270">verify.fivucsas.com · OIDC</text>
      <text class="c4-tdesc"  x="381" y="286">universal login + step-up MFA</text>

      
