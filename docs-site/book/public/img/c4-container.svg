<svg viewBox="0 0 1300 1090" role="img" preserveAspectRatio="xMidYMid meet"
       aria-label="FIVUCSAS C4 container diagram"
       style="display:block;width:100%;height:auto;font-family:'Inter','Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;-webkit-print-color-adjust:exact;print-color-adjust:exact;">
    <title>FIVUCSAS · C4 Container Diagram (real deployment)</title>

    <style>
      /* prefixed + scoped to avoid colliding with host-page CSS when embedded */
      .c4 *{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      .c4-bound{ stroke-dasharray:7 6; stroke-width:1.5; }
      .c4-card{ fill:#ffffff; stroke:#cbd5e1; stroke-width:1.5; }
      .c4-ext { fill:#f1f5f9; stroke:#94a3b8; stroke-width:1.5; stroke-dasharray:6 5; }
      .c4-heroi{ fill:#ffffff; stroke:#4f46e5; stroke-width:2.6; }
      .c4-heroc{ fill:#ffffff; stroke:#0891b2; stroke-width:2.6; }
      .c4-db  { fill:#f8fafc; stroke:#475569; stroke-width:1.5; }
      .c4-dblid{ fill:none; stroke:#475569; stroke-width:1.5; }
      .c4-person{ fill:#eef2ff; stroke:#4f46e5; stroke-width:1.8; }
      .c4-edge{ fill:#0891b2; }
      .c4-rel { fill:none; stroke:#64748b; stroke-width:1.7; }
      .c4-reld{ fill:none; stroke:#64748b; stroke-width:1.7; stroke-dasharray:5 4; }
      .c4-ttitle { font-size:18px; font-weight:700; fill:#0f172a; }
      .c4-ttitle2{ font-size:16px; font-weight:700; fill:#0f172a; }
      .c4-ttech  { font-size:16.1px; font-weight:600; fill:#0e7490; }
      .c4-tdesc  { font-size:15.4px; fill:#475569; }
      .c4-twarn  { font-size:15.4px; font-weight:700; fill:#b45309; }
      .c4-tbound { font-size:17.5px; font-weight:700; fill:#475569; letter-spacing:.05em; }
      .c4-tedget { font-size:25.2px; font-weight:800; fill:#ffffff; }
      .c4-tedges { font-size:16.1px; font-weight:500; fill:#e0f7fa; }
      .c4-tperson{ font-size:17.5px; font-weight:700; fill:#3730a3; }
      .c4-tpers2 { font-size:13.3px; font-weight:500; fill:#6366f1; }
      .c4-trel   { font-size:14.7px; font-weight:500; fill:#475569;
                   paint-order:stroke; stroke:#ffffff; stroke-width:3.2px; stroke-linejoin:round; }
      .c4-leg    { font-size:16.1px; fill:#475569; }
    </style>

    <defs>
      <marker id="c4ah" viewBox="0 0 8 8" markerWidth="8" markerHeight="8" refX="6.4" refY="4"
