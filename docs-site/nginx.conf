server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # VitePress clean URLs: /guide/overview -> guide/overview.html
    # no-cache (revalidate) on HTML/pages so a redeploy never serves a stale SPA shell
    # that points at old chunk hashes (cause of post-deploy "ghost 404s" until hard reload).
    location / {
        try_files $uri $uri.html $uri/ /404.html;
        add_header Cache-Control "no-cache";
    }

    # Long-cache the hashed VitePress assets (filenames change per build → safe to pin)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
