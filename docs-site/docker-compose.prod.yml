services:
  docs:
    build: .
    container_name: fivucsas-docs
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fivucsas-docs.rule=Host(`docs.fivucsas.com`)"
      - "traefik.http.routers.fivucsas-docs.entrypoints=websecure"
      - "traefik.http.routers.fivucsas-docs.tls.certresolver=letsencrypt"
      - "traefik.http.services.fivucsas-docs.loadbalancer.server.port=80"
    networks:
      - proxy
    deploy:
      resources:
        limits:
          memory: 32M

networks:
  proxy:
    external: true
