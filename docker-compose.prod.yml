version: '3.8'

# ============================================================================
# FIVUCSAS - Production Docker Compose Configuration
# ============================================================================
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Features:
# - Environment variables from .env file
# - Resource limits and reservations
# - Replica scaling for high availability
# - Optimized JVM and worker settings
# - Monitoring stack (Prometheus + Grafana)
#
# ============================================================================

services:
  # ==========================================================================
  # Database Layer - Production Settings
  # ==========================================================================
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Performance tuning
      POSTGRES_MAX_CONNECTIONS: 200
      POSTGRES_SHARED_BUFFERS: 512MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 2GB
      POSTGRES_WORK_MEM: 16MB
      POSTGRES_MAINTENANCE_WORK_MEM: 128MB
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # ==========================================================================
  # Cache Layer - Production Settings
  # ==========================================================================
  redis:
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ==========================================================================
  # Identity Core API - Production Settings
  # ==========================================================================
  identity-core-api:
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      LOGGING_LEVEL_ROOT: WARN
      LOGGING_LEVEL_APP: INFO
      # JVM Options (optimized for production)
      JAVA_OPTS: >
        -Xms2G -Xmx2G
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/app/logs/heapdump
        -Djava.security.egd=file:/dev/./urandom
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '1.0'
          memory: 2G
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback

  # ==========================================================================
  # Biometric Processor - Production Settings (Scaled)
  # ==========================================================================
  biometric-processor:
    environment:
      ENVIRONMENT: production
      DEBUG: "False"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Worker Configuration - Optimized
      WORKERS: 4
      WORKER_CONCURRENCY: 2
      UVICORN_WORKERS: 2
      UVICORN_TIMEOUT_KEEP_ALIVE: 5
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback

  # ==========================================================================
  # API Gateway - Production Settings
  # ==========================================================================
  api-gateway:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ==========================================================================
  # Monitoring - Prometheus
  # ==========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: fivucsas-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - fivucsas-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ==========================================================================
  # Monitoring - Grafana
  # ==========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: fivucsas-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - fivucsas-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

# ============================================================================
# Production Volumes
# ============================================================================
volumes:
  postgres_prod_data:
    name: fivucsas-postgres-prod-data
  prometheus_data:
    name: fivucsas-prometheus-data
  grafana_data:
    name: fivucsas-grafana-data

# ============================================================================
# Performance Summary
# ============================================================================
#
# Expected Capacity:
# - Max concurrent users: 1000+
# - Enrollment throughput: ~120/sec
# - Verification latency p95: <500ms
#
# Resource Requirements (Total):
# - CPUs: ~12 cores
# - RAM: ~20GB
# - Disk: 100GB (database + logs + models)
#
# Scaling Recommendations:
# - For 2000 users: Scale biometric-processor to 4 replicas
# - For 5000 users: Add database read replicas
#
# ============================================================================
