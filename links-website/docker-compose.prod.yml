# links.fivucsas.com — static link page on the Hetzner box behind Traefik
# (automatic Let's Encrypt TLS). Replaces Hostinger hosting (plan cancelled
# 2026-06). Point links.fivucsas.com's A record to 116.203.222.213 at turkticaret.
services:
  fivucsas-links:
    build:
      context: .
      dockerfile: Dockerfile
    image: fivucsas-links
    container_name: fivucsas-links
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fivucsas-links.rule=Host(`links.fivucsas.com`)"
      - "traefik.http.routers.fivucsas-links.entrypoints=websecure"
      - "traefik.http.routers.fivucsas-links.tls.certresolver=letsencrypt"
      - "traefik.http.routers.fivucsas-links.middlewares=secure-headers@file,rate-limit@file"
      - "traefik.http.services.fivucsas-links.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          memory: 32M
          pids: 64

networks:
  proxy:
    name: proxy
    external: true
