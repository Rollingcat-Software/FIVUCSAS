name: Deploy BYS Demo to Hetzner

# demo.fivucsas.com — static BYS demo, now an nginx container on the Hetzner box
# behind Traefik (auto Let's Encrypt TLS). Replaces Hostinger hosting (plan
# cancelled 2026-06). No build step (pure static). VPS_* secrets already exist.

on:
  push:
    branches: [master, main]
    paths:
      - 'bys-demo/**'
      - '.github/workflows/deploy-bys-demo-hetzner.yml'
  workflow_dispatch:

concurrency:
  group: deploy-fivucsas-bys-demo
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy demo.fivucsas.com
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        timeout-minutes: 8
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 6m
          script: |
            set -e
            cd /opt/projects/fivucsas
            git pull origin master
            cd bys-demo
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml ps
            curl -skf -o /dev/null --resolve demo.fivucsas.com:443:127.0.0.1 \
              https://demo.fivucsas.com/ && echo "demo.fivucsas.com healthy"
