# Repo structure-lock gate (Rollingcat-Software/FIVUCSAS#209).
#
# Thin caller for the org-shared reusable workflow. It FREEZES this repo's root
# layout (see .repo-structure.yml) and FAILS the PR when a disallowed/forbidden
# file appears — e.g. a stray dated tracking doc at the root.
#
# This is BLOCKING on master via an additive repository ruleset "structure-lock"
# (ruleset id 17635884) that requires the check named exactly:
#     repo-structure / structure-check
# To replicate on another repo, POST an additive ruleset (NOT a branch-protection
# PUT — a full-replacement PUT of branch protection is blocked/risky). Example:
#   gh api -X POST repos/<owner>/<repo>/rulesets --input ruleset.json
# where ruleset.json requires required_status_checks context
# "repo-structure / structure-check" on the default branch, with a RepositoryRole
# (admin) bypass actor. See PR Rollingcat-Software/FIVUCSAS#210 for details.
name: structure-check

on:
  pull_request:
    branches: [master, main]

jobs:
  repo-structure:
    uses: Rollingcat-Software/.github/.github/workflows/repo-structure.yml@main
