# Repo structure-lock policy — FIVUCSAS umbrella (Rollingcat-Software/FIVUCSAS#209)
#
# An ArchUnit-style FREEZE of this repo's ROOT layout. The allowlists below were
# frozen from the clean origin/master root after the 2026-06 cleanup; the gate
# (tools/check_repo_structure.py in the org .github repo, run via the reusable
# workflow .github/workflows/structure-check.yml) FAILS CI when:
#   * a root entry not listed here appears, OR
#   * any root entry matches a forbidden pattern, OR
#   * a required file is missing.
#
# Dated tracking docs (audits / reviews / sessions / TODOs) belong in GitHub
# issues, NOT the repo root — that is what forbidden_root_patterns encodes.
# To intentionally add a NEW root entry, add it here in the SAME PR (the
# explicit, reviewed "unfreeze"). Parsed by a stdlib-only YAML subset, so keep
# to simple `- "string"` block lists.

allowed_root_files:
  - "CHANGELOG.md"
  - "CLAUDE.md"
  - "CONTRIBUTING.md"
  - "LICENSE"
  - "LOCAL_TESTING_RUNBOOK.md"
  - "OPERATOR_SECURITY_RUNBOOKS.md"
  - "README.md"
  - "SECURITY.md"
  - "docker-compose.yml"
  - "docker-compose.dev.yml"
  - "docker-compose.prod.yml"
  - ".env.example"
  - ".gitignore"
  - ".gitmodules"
  - ".pre-commit-config.yaml"
  - ".pre-commit-install"
  - ".repo-structure.yml"

allowed_root_dirs:
  - ".claude"
  - ".github"
  - "biometric-processor"
  - "bys-demo"
  - "client-apps"
  - "docs"
  - "docs-site"
  - "identity-core-api"
  - "infra"
  - "landing-website"
  - "links-website"
  - "load-tests"
  - "monitoring"
  - "nginx"
  - "practice-and-test"
  - "scripts"
  - "spoof-detector"
  - "Thesis"
  - "verify-widget"
  - "web-app"

# Dated / tracking-doc names that must NEVER reappear at the root.
# These are Python `re` patterns, matched with re.search against each root entry
# name. Tracking content goes in GitHub issues instead. Use SINGLE quotes so
# backslashes stay literal (write \d and \. — not \\d) for the regex engine.
forbidden_root_patterns:
  - '.*_(AUDIT|REVIEW|FINDINGS|REGISTER|TRIAGE|SWEEP|STATUS|SESSION|RECONCILIATION)_.*\.md$'
  - '.*_\d{4}-\d{2}-\d{2}.*\.md$'
  - '^(TODO|ROADMAP|BACKLOG|OPERATOR_TODO|PERSONAL_TODO).*\.md$'

required_files:
  - "README.md"
  - "LICENSE"
  - ".gitignore"
