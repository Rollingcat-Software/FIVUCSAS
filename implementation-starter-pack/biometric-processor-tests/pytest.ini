[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --strict-markers
    --cov=app
    --cov-report=term-missing:skip-covered
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=80
    --verbose
    --tb=short
    --color=yes

markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (slower, uses containers)
    e2e: End-to-end tests (slowest, full system)
    slow: Slow tests (skip with -m "not slow")
    ml: Tests that require ML models

asyncio_mode = auto

[coverage:run]
source = app
omit =
    */tests/*
    */test_*.py
    */__init__.py
    */config.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = htmlcov
title = Biometric Processor Test Coverage
