name: Test and Coverage

on:
  push:
    branches: [ main, develop, 'claude/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ==========================================================================
  # Identity Core API Tests (Java/Spring Boot)
  # ==========================================================================
  test-identity-core-api:
    name: Identity Core API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: identity_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x identity-core-api/gradlew
        working-directory: ./identity-core-api

      - name: Run unit tests
        run: ./gradlew test --info
        working-directory: ./identity-core-api
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Run integration tests
        run: ./gradlew integrationTest
        working-directory: ./identity-core-api
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Generate Jacoco coverage report
        run: ./gradlew jacocoTestReport
        working-directory: ./identity-core-api

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./identity-core-api/build/reports/jacoco/test/jacocoTestReport.xml
          flags: identity-core-api
          name: identity-core-api-coverage
          fail_ci_if_error: false

      - name: Check coverage threshold
        run: ./gradlew jacocoTestCoverageVerification
        working-directory: ./identity-core-api

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            identity-core-api/build/test-results/**/*.xml

      - name: Upload test reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: identity-core-api-test-reports
          path: |
            identity-core-api/build/reports/
            identity-core-api/build/test-results/

  # ==========================================================================
  # Biometric Processor Tests (Python/FastAPI)
  # ==========================================================================
  test-biometric-processor:
    name: Biometric Processor Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: biometric_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libglib2.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
        working-directory: ./biometric-processor

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --junitxml=test-results/junit.xml \
            -v -m "not ml"
        working-directory: ./biometric-processor
        env:
          ENVIRONMENT: test
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            --cov=app \
            --cov-append \
            --cov-report=xml \
            --cov-report=term \
            --junitxml=test-results/integration-junit.xml \
            -v -m "not ml"
        working-directory: ./biometric-processor
        env:
          ENVIRONMENT: test
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./biometric-processor/coverage.xml
          flags: biometric-processor
          name: biometric-processor-coverage
          fail_ci_if_error: false

      - name: Check coverage threshold (80%)
        run: |
          coverage report --fail-under=80
        working-directory: ./biometric-processor

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            biometric-processor/test-results/**/*.xml

      - name: Upload test reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: biometric-processor-test-reports
          path: |
            biometric-processor/htmlcov/
            biometric-processor/test-results/

  # ==========================================================================
  # Coverage Comment on PR
  # ==========================================================================
  coverage-comment:
    name: Comment PR with Coverage
    runs-on: ubuntu-latest
    needs: [test-identity-core-api, test-biometric-processor]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v3

      - name: Comment coverage on PR
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 70
