# ============================================================================
# FIVUCSAS - Nginx Load Balancer Configuration
# ============================================================================
#
# Purpose: Distribute load across multiple biometric-processor replicas
#
# Upstream Pools:
# - identity-api: 1 instance (no load balancing needed)
# - biometric-processor: 3 replicas (load balanced)
#
# Load Balancing Strategy:
# - Round-robin with health checks
# - Fail timeout: 30s (retry after 30 seconds)
# - Max fails: 3 (mark as down after 3 failures)
#
# ============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;  # Support high concurrency
    use epoll;  # Efficient event handling on Linux
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;  # Allow large biometric uploads

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # ==========================================================================
    # Upstream Pool: Identity Core API (Single Instance)
    # ==========================================================================
    upstream identity-api {
        server identity-api:8080 max_fails=3 fail_timeout=30s;

        # Health check (Nginx Plus feature, for open-source use proxy_next_upstream)
        # health_check interval=10s fails=3 passes=2;
    }

    # ==========================================================================
    # Upstream Pool: Biometric Processor (3 Replicas - Load Balanced)
    # ==========================================================================
    upstream biometric-processor {
        # Load balancing method: Round-robin (default)
        # Alternatives: least_conn, ip_hash, random

        # Replica 1
        server biometric-processor:8000 max_fails=3 fail_timeout=30s;

        # Note: Docker Compose will handle DNS resolution to all replicas
        # The service name resolves to all replica IPs automatically

        # Connection pooling
        keepalive 32;  # Keep 32 idle connections to upstream
    }

    # ==========================================================================
    # HTTP Server (Port 80)
    # ==========================================================================
    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # ==========================================================================
        # Identity Core API Routes
        # ==========================================================================
        location /api/auth/ {
            proxy_pass http://identity-api;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # Error handling
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        location /api/users/ {
            proxy_pass http://identity-api;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /api/tenants/ {
            proxy_pass http://identity-api;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ==========================================================================
        # Biometric Processor Routes (LOAD BALANCED)
        # ==========================================================================
        location /api/biometric/ {
            proxy_pass http://biometric-processor;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";  # For keepalive

            # Longer timeouts for ML processing
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;  # 5 minutes for enrollment
            proxy_read_timeout 300s;  # 5 minutes for enrollment

            # Buffering (disable for streaming responses)
            proxy_buffering off;
            proxy_request_buffering off;

            # Error handling (try next replica on failure)
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 3;  # Try all 3 replicas

            # HTTP version for keepalive
            proxy_http_version 1.1;
        }

        # Health check endpoint (load balanced)
        location /api/biometric/health {
            proxy_pass http://biometric-processor/health;

            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;

            access_log off;  # Don't log health checks
        }

        # ==========================================================================
        # Monitoring Endpoints
        # ==========================================================================
        location /actuator/ {
            proxy_pass http://identity-api;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Allow Prometheus scraping
            allow 172.20.0.0/16;  # Docker network
            deny all;
        }

        # ==========================================================================
        # Nginx Status (for monitoring)
        # ==========================================================================
        location /nginx_status {
            stub_status on;
            access_log off;

            # Restrict to Docker network
            allow 172.20.0.0/16;
            deny all;
        }

        # ==========================================================================
        # Default Route
        # ==========================================================================
        location / {
            return 200 'FIVUCSAS API Gateway\n';
            add_header Content-Type text/plain;
        }
    }

    # ==========================================================================
    # HTTPS Server (Port 443) - Optional
    # ==========================================================================
    # Uncomment and configure SSL certificates for production
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # Same location blocks as above
    # }
}

# ============================================================================
# Load Balancing Summary
# ============================================================================
#
# Biometric Processor Pool:
# - 3 replicas with round-robin load balancing
# - Health checks via proxy_next_upstream
# - Automatic failover to healthy replicas
# - Keepalive connections for better performance
#
# Expected Performance:
# - Request distribution: 33% per replica
# - Failover time: <1 second
# - Max capacity: 6 concurrent ML jobs (3 workers x 2 jobs each)
#
# Monitoring:
# - Access logs include upstream response times
# - Nginx status available at /nginx_status
# - Error logs show upstream failures
#
# ============================================================================
